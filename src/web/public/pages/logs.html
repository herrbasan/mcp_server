<header>
	<h1>Logs Viewer</h1>
	<p>Monitor requests and responses from the orchestrator and LM Studio endpoint.</p>
</header>

<section>
	<h2>Actions</h2>
	<nui-button-container gap="0.5rem">
		<nui-button type="primary">
			<button type="button" data-action="refresh-logs">Refresh</button>
		</nui-button>
		<nui-button type="outline">
			<button type="button" data-action="toggle-auto-refresh">Auto-Refresh: OFF</button>
		</nui-button>
		<nui-button variant="danger">
			<button type="button" data-action="clear-logs">Clear Logs</button>
		</nui-button>
	</nui-button-container>
</section>

<section>
	<h2>Recent Activity</h2>
	<div id="logs-list">
		<p>Loading...</p>
	</div>
</section>
