<link rel="stylesheet" href="/css/pages/codebases-maintenance.css">

<header>
	<h1>Maintenance</h1>
	<p>Manage index maintenance and monitor system health.</p>
</header>

<section>
	<h2>Actions</h2>
	<nui-button-container gap="0.5rem">
		<nui-button type="primary">
			<button type="button" data-action="run-maintenance">Run Maintenance Now</button>
		</nui-button>
		<nui-button type="outline">
			<button type="button" data-action="refresh-all">Refresh All Codebases</button>
		</nui-button>
	</nui-button-container>
</section>

<section>
	<h2>Statistics</h2>
	<nui-table>
		<table>
			<tbody>
				<tr>
					<td>Total Refreshes</td>
					<td id="maint-refreshes">-</td>
				</tr>
				<tr>
					<td>Files Updated</td>
					<td id="maint-updated">-</td>
				</tr>
				<tr>
					<td>Last Run</td>
					<td id="maint-last-run">-</td>
				</tr>
				<tr>
					<td>Auto-Refresh</td>
					<td id="maint-auto">-</td>
				</tr>
				<tr>
					<td>Interval</td>
					<td id="maint-interval">-</td>
				</tr>
			</tbody>
		</table>
	</nui-table>
</section>

<section>
	<h2>Staleness Overview</h2>
	<div id="staleness-list">
		<p class="text-secondary">Loading...</p>
	</div>
</section>

<script type="nui/page">
const API_BASE = window.location.origin;

async function loadMaintenanceStats() {
	try {
		const res = await fetch(`${API_BASE}/api/codebase/maintenance-stats`);
		if (res.ok) {
			const stats = await res.json();
			element.querySelector('#maint-refreshes').textContent = stats.totalRefreshes || 0;
			element.querySelector('#maint-updated').textContent = stats.filesUpdated || 0;
			element.querySelector('#maint-last-run').textContent = stats.lastRun 
				? new Date(stats.lastRun).toLocaleString() 
				: 'Never';
			element.querySelector('#maint-auto').textContent = stats.enabled ? 'Enabled' : 'Disabled';
			element.querySelector('#maint-interval').textContent = stats.intervalMinutes 
				? `${stats.intervalMinutes} min` 
				: '-';
		}
	} catch (err) {
		console.error('Failed to load maintenance stats:', err);
	}
}

async function loadStalenessOverview() {
	try {
		const res = await fetch(`${API_BASE}/api/codebase/list`);
		if (!res.ok) return;
		
		const data = await res.json();
		const codebases = data.codebases || [];
		
		const container = element.querySelector('#staleness-list');
		if (!container) return;
		
		if (codebases.length === 0) {
			container.innerHTML = '<p>No codebases indexed.</p>';
			return;
		}
		
		let html = '';
		for (const cb of codebases) {
			const statusClass = cb.status === 'stale' ? 'stale' : 'current';
			const statusText = cb.status === 'stale' ? '⚠ Stale' : '✓ Current';
			const lastIndexed = cb.lastIndexed 
				? new Date(cb.lastIndexed).toLocaleString()
				: 'Never';
			
			html += `
				<div class="stale-item ${statusClass}">
					<div class="stale-info">
						<div class="stale-name">${cb.name}</div>
						<div class="stale-meta">${cb.files || 0} files • Last indexed: ${lastIndexed}</div>
					</div>
					<div class="stale-status">${statusText}</div>
				</div>
			`;
		}
		container.innerHTML = html;
		
	} catch (err) {
		console.error('Failed to load staleness overview:', err);
	}
}

// Handle actions
element.addEventListener('click', async (e) => {
	const btn = e.target.closest('[data-action]');
	if (!btn) return;
	
	const action = btn.dataset.action;
	
	if (action === 'run-maintenance') {
		btn.disabled = true;
		btn.textContent = 'Running...';
		try {
			const res = await fetch(`${API_BASE}/api/codebase/run-maintenance`, {
				method: 'POST'
			});
			if (res.ok) {
				await nui.components.dialog.alert('Success', 'Maintenance complete');
				await loadMaintenanceStats();
				await loadStalenessOverview();
			}
		} catch (err) {
			await nui.components.dialog.alert('Error', err.message);
		} finally {
			btn.disabled = false;
			btn.textContent = 'Run Maintenance Now';
		}
	}
	
	if (action === 'refresh-all') {
		const confirmed = await nui.components.dialog.confirm('Refresh All', 'Refresh all codebases? This may take a while.');
		if (!confirmed) return;
		
		btn.disabled = true;
		btn.textContent = 'Refreshing...';
		try {
			const listRes = await fetch(`${API_BASE}/api/codebase/list`);
			const data = await listRes.json();
			const codebases = data.codebases || [];
			
			for (const cb of codebases) {
				await fetch(`${API_BASE}/api/codebase/refresh`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ name: cb.name })
				});
			}
			await nui.components.dialog.alert('Success', 'All codebases refreshed');
			await loadStalenessOverview();
			await loadMaintenanceStats();
		} catch (err) {
			await nui.components.dialog.alert('Error', err.message);
		} finally {
			btn.disabled = false;
			btn.textContent = 'Refresh All Codebases';
		}
	}
});

async function init(element, params) {
	await loadMaintenanceStats();
	await loadStalenessOverview();
}
</script>
