<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light dark">
	<title>MCP Orchestrator Dashboard</title>
	<link rel="stylesheet" href="/nui_wc2/NUI/css/nui-theme.css">
	<link rel="stylesheet" href="/nui_wc2/NUI/css/modules/nui-menu.css">
	<link rel="stylesheet" href="/nui_wc2/NUI/css/modules/nui-list.css">
	<link rel="stylesheet" href="/css/main.css">
	<script type="module" src="/web/public/app.js"></script>
</head>
<body>
	<nui-app data-layout="app" nui-vars-sidebar_width="15rem" nui-vars-sidebar_force-breakpoint="60rem">
		<nui-skip-links></nui-skip-links>

		<nui-top-nav>
			<header>
				<layout>
					<item>
						<nui-button data-action="toggle-sidebar">
							<button type="button" aria-label="Toggle navigation menu">
								<nui-icon name="menu">☰</nui-icon>
							</button>
						</nui-button>
					</item>
					<item>
						<h1>MCP Orchestrator</h1>
					</item>
					<item>
						<nui-button data-action="toggle-theme">
							<button type="button" aria-label="Toggle light/dark theme">
								<nui-icon name="brightness">⛭</nui-icon>
							</button>
						</nui-button>
					</item>
				</layout>
			</header>
		</nui-top-nav>

		<nui-side-nav>
			<nui-link-list mode="fold">
				<!-- Navigation loaded from JavaScript -->
			</nui-link-list>
		</nui-side-nav>

		<nui-content>
			<nui-main>
				<!-- Content loaded dynamically -->
			</nui-main>
		</nui-content>

		<nui-app-footer>
			<span>MCP Orchestrator v1.0</span>
		</nui-app-footer>
	</nui-app>
</body>
</html>
